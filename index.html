    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 88% 10%, rgba(184, 154, 246, 0.22), transparent 28%),
        radial-gradient(circle at 8% 82%, rgba(255, 170, 196, 0.22), transparent 30%),
        linear-gradient(145deg, #fff6ef 0%, #fff1f6 52%, #fffaf5 100%);
      overflow-x: hidden;
    }

    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      width: min(100%, 520px);
      margin: 0 auto;
      position: relative;
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
    }

    .soft-noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.28) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    .topbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      letter-spacing: 0;
      position: relative;
      z-index: 4;
    }

    .close {
      position: absolute;
      left: 0;
      width: 38px;
      height: 38px;
      border: 0;
      background: transparent;
      color: var(--ink);
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
    }

    .moment {
      font-family: "Marker Felt", "Comic Sans MS", cursive;
      font-size: 1.08em;
    }

    .sound {
      position: absolute;
      right: 0;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(123, 103, 127, 0.15);
      border-radius: 50%;
      background: rgba(255,255,255,0.68);
      color: #7d6c82;
      box-shadow: 0 10px 24px rgba(138, 93, 150, 0.12);
      cursor: pointer;
    }

    .sound.playing {
      color: white;
      background: var(--pink);
    }

    .float {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      filter: drop-shadow(0 10px 12px rgba(226, 91, 143, 0.15));
      animation: drift 6s ease-in-out infinite;
    }

    .heart-a { top: 98px; left: 26px; }
    .heart-b { top: 420px; right: 30px; animation-delay: -2s; transform: scale(0.82); }
    .spark { top: 390px; left: 26px; animation-delay: -1.2s; }
    .butterfly { top: 410px; right: 48px; animation-delay: -2.8s; }

    @keyframes drift {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -12px; }
    }

    .pixel-heart {
      width: 56px;
      height: 50px;
      image-rendering: pixelated;
      background:
        linear-gradient(#f768a7 0 0) 12px 0 / 12px 12px no-repeat,
        linear-gradient(#ff8dba 0 0) 24px 0 / 12px 12px no-repeat,
        linear-gradient(#f768a7 0 0) 0 12px / 48px 12px no-repeat,
        linear-gradient(#df4387 0 0) 48px 12px / 8px 12px no-repeat,
        linear-gradient(#ff9ac5 0 0) 8px 24px / 40px 12px no-repeat,
        linear-gradient(#e14b8c 0 0) 16px 36px / 24px 12px no-repeat,
        linear-gradient(#c7367a 0 0) 24px 48px / 8px 8px no-repeat;
    }

    .pixel-spark {
      width: 34px;
      height: 34px;
      image-rendering: pixelated;
      background:
        linear-gradient(#ffe071 0 0) 14px 0 / 6px 34px no-repeat,
        linear-gradient(#ffe071 0 0) 0 14px / 34px 6px no-repeat,
        linear-gradient(#fff1a3 0 0) 8px 8px / 18px 18px no-repeat,
        linear-gradient(#f4bd35 0 0) 14px 14px / 6px 6px no-repeat;
    }

    .stage {
      position: relative;
      z-index: 2;
      flex: 1;
      display: none;
      padding-top: 72px;
      min-height: calc(100vh - 120px);
    }

    .stage.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeUp 360ms ease both;
    }

    .stage.scenery-stage {
      margin: -80px -24px -28px;
      padding: 132px 24px 38px;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
      color: white;
    }

    .stage.scenery-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image: var(--sakura-bg);
      background-size: cover;
      background-position: 54% center;
      transform: scale(1.02);
    }

    .stage.scenery-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(18, 29, 52, 0.28), rgba(28, 17, 30, 0.5)),
        radial-gradient(circle at 23% 24%, rgba(255, 190, 119, 0.22), transparent 32%);
    }

    .stage.scenery-stage .headline,
    .stage.scenery-stage .sub {
      color: white;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.42);
    }

    .stage.scenery-stage .pink {
      color: #ffd3e3;
    }

    .stage.scenery-stage .other {
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
    }

    .stage.scenery-stage .progress span {
      background: rgba(255, 255, 255, 0.34);
    }

    .stage.scenery-stage .progress span.on {
      background: #ffd3e3;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1, h2, p { margin: 0; }

    .eyebrow {
      color: var(--lavender);
      letter-spacing: 0.28em;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 22px;
    }

    .headline {
      max-width: 420px;
      text-align: center;
      font-size: clamp(32px, 8vw, 46px);
      line-height: 1.24;
      letter-spacing: 0;
      font-weight: 500;
    }

    .headline .pink { color: var(--pink); font-weight: 700; }
    .sub {
      margin-top: 22px;
      color: var(--muted);
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
    }

    .asset {
      margin: 56px 0 64px;
    }

    .envelope {
      width: 180px;
      height: 126px;
      position: relative;
      filter: drop-shadow(0 18px 16px rgba(213, 82, 132, 0.18));
      image-rendering: pixelated;
    }

    .envelope::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background:
        linear-gradient(135deg, transparent 49%, #f7d7ad 50% 62%, transparent 63%),
        linear-gradient(225deg, transparent 49%, #f7d7ad 50% 62%, transparent 63%),
        linear-gradient(#fff1cb, #ffe8b9);
      border: 10px solid #f28aa9;
      box-shadow: inset 0 -8px #f5bb9a;
    }

    .envelope::after {
      content: "";
      position: absolute;
      width: 58px;
      height: 50px;
      left: 61px;
      top: 50px;
      background: #ff619f;
      clip-path: polygon(50% 85%, 8% 43%, 8% 18%, 25% 5%, 50% 24%, 75% 5%, 92% 18%, 92% 43%);
      box-shadow: inset 0 -7px rgba(192, 46, 113, 0.2);
    }

    .bubble-heart {
      width: 184px;
      height: 142px;
      position: relative;
      border-radius: 14px;
      background: #fff3c8;
      border: 12px solid #f48fb1;
      filter: drop-shadow(0 18px 16px rgba(213, 82, 132, 0.16));
    }

    .bubble-heart::before {
      content: "";
      position: absolute;
      left: 20px;
      bottom: -34px;
      width: 42px;
      height: 42px;
      background: #fff3c8;
      border-left: 12px solid #f48fb1;
      border-bottom: 12px solid #f48fb1;
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    .bubble-heart::after {
      content: "";
      position: absolute;
      width: 78px;
      height: 68px;
      left: 43px;
      top: 30px;
      background: #ff77a9;
      clip-path: polygon(50% 85%, 8% 43%, 8% 18%, 25% 5%, 50% 24%, 75% 5%, 92% 18%, 92% 43%);
      box-shadow: inset 0 -8px rgba(204, 54, 121, 0.17);
    }

    .cloud {
      width: 168px;
      height: 118px;
      border-radius: 48% 52% 42% 58% / 55% 55% 45% 45%;
      background: linear-gradient(145deg, #faf2ff, #b68af2 72%);
      position: relative;
      filter: drop-shadow(0 12px 12px rgba(143, 91, 219, 0.18));
      box-shadow: inset -12px -12px rgba(126, 87, 194, 0.18);
    }

    .cloud::before, .cloud::after {
      content: "";
      position: absolute;
      bottom: -28px;
      width: 20px;
      height: 54px;
      background: #9d72db;
      border-radius: 10px;
    }

    .cloud::before { left: 48px; }
    .cloud::after { right: 44px; }

    .cloud span {
      position: absolute;
      bottom: -46px;
      width: 28px;
      height: 28px;
      background: #9b70d9;
      transform: rotate(45deg);
      border-radius: 8px;
    }

    .cloud .drop-a { left: 42px; }
    .cloud .drop-b { left: 72px; }
    .cloud .drop-c { right: 37px; }

    .cloud-face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding-top: 18px;
      color: #271f4a;
      font-size: 38px;
      letter-spacing: 6px;
    }

    .cta-row {
      width: 100%;
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 44px;
    }

    .button {
      min-width: 176px;
      min-height: 68px;
      border: 0;
      border-radius: 999px;
      color: white;
      background: var(--pink);
      box-shadow: inset 0 -8px rgba(167, 42, 101, 0.25), 0 16px 30px rgba(222, 79, 142, 0.22);
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      padding: 0 28px;
      transition: transform 160ms ease, filter 160ms ease;
    }

    .button:hover { transform: translateY(-2px); filter: saturate(1.06); }
    .button:active { transform: translateY(2px); }
    .button.secondary {
      color: #756b75;
      background: #eee8df;
      box-shadow: inset 0 -7px rgba(149, 137, 125, 0.2), 0 12px 24px rgba(134, 117, 111, 0.12);
    }
    .button.purple {
      background: var(--lavender);
      box-shadow: inset 0 -8px rgba(104, 69, 188, 0.25), 0 16px 30px rgba(147, 100, 224, 0.2);
    }

    .grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 36px 0 18px;
    }

    .option {
      min-height: 132px;
      border: 2px solid transparent;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 12px 6px;
      color: #5b515b;
      cursor: pointer;
      position: relative;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .option:hover { transform: translateY(-2px); }
    .option.selected {
      border-color: var(--pink);
      background: rgba(255, 238, 247, 0.9);
    }

    .option.selected::after {
      content: "✓";
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--pink);
      color: white;
      font-weight: 800;
    }

    .emoji {
      font-size: 38px;
      line-height: 1;
      filter: drop-shadow(0 7px 8px rgba(94, 55, 84, 0.12));
    }

    .food-picture {
      width: 58px;
      height: 58px;
      object-fit: contain;
      filter: drop-shadow(0 8px 10px rgba(94, 55, 84, 0.13));
    }

    .option-name {
      font-size: 18px;
      font-weight: 700;
    }

    .other {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
      padding: 14px 18px;
      min-height: 72px;
      border-radius: var(--radius);
      border: 2px solid transparent;
      background: rgba(255,255,255,0.72);
      box-shadow: var(--shadow);
    }

    .other input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 19px;
      color: var(--ink);
    }

    .final-card {
      width: 100%;
      max-width: 460px;
      border-radius: 18px;
      background: rgba(255,255,255,0.82);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 26px;
      text-align: left;
    }

    .ticket {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px;
      border-radius: var(--radius);
      background: #fff4f8;
      margin: 18px 0;
    }

    .ticket .emoji { font-size: 42px; }

    .ticket strong {
      display: block;
      font-size: 24px;
      color: var(--ink);
    }

    .ticket span {
      color: var(--muted);
      line-height: 1.5;
    }

    .linkbox {
      width: 100%;
      margin-top: 18px;
      padding: 14px 16px;
      border: 1px dashed rgba(210, 95, 148, 0.45);
      border-radius: var(--radius);
      color: #705f6d;
      background: rgba(255, 248, 251, 0.78);
      word-break: break-all;
      font-size: 14px;
      line-height: 1.5;
    }

    .progress {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      width: 100%;
      margin-top: 22px;
    }

    .progress span {
      height: 5px;
      border-radius: 999px;
      background: rgba(224, 193, 207, 0.42);
    }

    .progress span.on { background: var(--pink); }

    @media (max-width: 420px) {
      .app { padding-inline: 18px; }
      .grid { gap: 10px; }
      .option { min-height: 118px; }
      .emoji { font-size: 32px; }
      .option-name { font-size: 16px; }
      .button { min-width: 148px; font-size: 20px; }
      .headline { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="soft-noise"></div>
  <main class="app">
    <div class="float heart-a pixel-heart"></div>
    <div class="float heart-b pixel-heart"></div>
    <div class="float spark pixel-spark"></div>

    <section class="stage active scenery-stage" data-stage="0">
      <h1 class="headline">想约你吃顿好吃的<br>准备了一个小 <span class="pink moment">Moment</span></h1>

    <section class="stage" data-stage="2">

    <section class="stage" data-stage="3">
      <h2 class="headline">我们吃点什么？</h2>

    <section class="stage" data-stage="4">

    </section>

    <section class="stage scenery-stage" data-stage="5">

  </main>

    const places = [

      ["公园", "🌳"], ["商场", "🛍️"], ["海边", "🏖️"],
      ["展览馆", "🖼️"], ["我家附近", "🏠"], ["火车站", "🚉"]
    ];

    const state = {
      stage: 0,
      food: "小龙虾",
      foodEmoji: "🦞",
      place: "商场",
      placeEmoji: "🛍️",
      date: "",
      time: ""
    };

    const stages = [...document.querySelectorAll(".stage")];
    const params = new URLSearchParams(location.search);
    const hasSharedResult = ["food", "place", "date", "time"].some(key => params.has(key));
    if (params.get("food")) state.food = params.get("food");
    if (params.get("place")) state.place = params.get("place");
    if (params.get("date")) state.date = params.get("date");
    if (params.get("time")) state.time = params.get("time");

    const linkedFood = foods.find(([name]) => name === state.food);
    const linkedPlace = places.find(([name]) => name === state.place);
    if (linkedFood) state.foodEmoji = linkedFood[1];
    if (linkedPlace) state.placeEmoji = linkedPlace[1];

    function optionButton([name, emoji, image], kind) {
      const button = document.createElement("button");
      button.className = "option";
      button.type = "button";
      button.dataset.value = name;
      const visual = image
        ? `<img class="food-picture" src="${image}" alt="${name}">`
        : `<span class="emoji">${emoji}</span>`;
      button.innerHTML = `${visual}<span class="option-name">${name}</span>`;
      button.addEventListener("click", () => {
        state[kind] = name;
        state[kind + "Emoji"] = emoji;
        renderOptions();
        updateFinal();
      });
      return button;
    }

    const foodGrid = document.getElementById("foodGrid");
    const placeGrid = document.getElementById("placeGrid");
    foods.forEach(item => foodGrid.append(optionButton(item, "food")));
    places.forEach(item => placeGrid.append(optionButton(item, "place")));

    document.getElementById("customFood").addEventListener("input", event => {
      if (event.target.value.trim()) {
        state.food = event.target.value.trim();
        state.foodEmoji = "🍽️";
        renderOptions();
        updateFinal();
      }
    });

      document.getElementById("customPlace").addEventListener("input", event => {
      if (event.target.value.trim()) {
        state.place = event.target.value.trim();
        state.placeEmoji = "📍";
        renderOptions();
        updateFinal();
      }
    });

    document.getElementById("dateInput").value = state.date;
    document.getElementById("timeInput").value = state.time;
    document.getElementById("dateInput").addEventListener("input", event => {
      state.date = event.target.value;
      updateFinal();
    });
    document.getElementById("timeInput").addEventListener("input", event => {
      state.time = event.target.value;
      updateFinal();
    });

    function renderOptions() {
      document.querySelectorAll("#foodGrid .option").forEach(button => {
        button.classList.toggle("selected", button.dataset.value === state.food);
      });
      document.querySelectorAll("#placeGrid .option").forEach(button => {
        button.classList.toggle("selected", button.dataset.value === state.place);
      });
    }

    function showStage(index) {
      state.stage = Math.max(0, Math.min(index, stages.length - 1));
      stages.forEach(stage => stage.classList.toggle("active", Number(stage.dataset.stage) === state.stage));
      updateFinal();
    }

    function updateFinal() {
      document.getElementById("foodName").textContent = state.food;
      document.getElementById("foodEmoji").textContent = state.foodEmoji;
      document.getElementById("placeName").textContent = state.place;
      document.getElementById("placeEmoji").textContent = state.placeEmoji;
      const when = [state.date, state.time].filter(Boolean).join(" ");
      document.getElementById("dateTimeName").textContent = when || "待确认";
      const url = new URL(location.href);
      url.searchParams.set("food", state.food);
      url.searchParams.set("place", state.place);
      if (state.date) url.searchParams.set("date", state.date); else url.searchParams.delete("date");
      if (state.time) url.searchParams.set("time", state.time); else url.searchParams.delete("time");
      url.hash = "result";
      document.getElementById("shareLink").textContent = url.toString();
    }

    document.querySelectorAll("[data-next]").forEach(button => {
      button.addEventListener("click", () => showStage(state.stage + 1));
    });

    document.querySelectorAll("[data-reset]").forEach(button => {
      button.addEventListener("click", () => showStage(0));
    });

    document.querySelector("[data-shy]").addEventListener("click", event => {
      event.currentTarget.textContent = "还是愿意吧";
      event.currentTarget.classList.remove("secondary");
      event.currentTarget.addEventListener("click", () => showStage(3), { once: true });
    });

    document.getElementById("copyLink").addEventListener("click", async event => {
      const text = document.getElementById("shareLink").textContent;
      try {
        await navigator.clipboard.writeText(text);
        event.currentTarget.textContent = "已复制";
      } catch {
        event.currentTarget.textContent = "复制这条链接";
      }
      setTimeout(() => event.currentTarget.textContent = "复制链接", 1400);
    });

    document.querySelector(".sound").addEventListener("click", async event => {
      const audio = document.getElementById("bgm");
      try {
        if (audio.paused) {
          await audio.play();
          event.currentTarget.classList.add("playing");
          event.currentTarget.textContent = "♫";
        } else {
          audio.pause();
          event.currentTarget.classList.remove("playing");
          event.currentTarget.textContent = "♪";
        }
      } catch {
        event.currentTarget.title = "请把授权音频放到 assets/xingqing.mp3";
        event.currentTarget.textContent = "!";
        setTimeout(() => event.currentTarget.textContent = "♪", 1400);
      }
    });

    renderOptions();
    showStage(hasSharedResult || location.hash === "#result" ? 6 : 0);
  </script>
